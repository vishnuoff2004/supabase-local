version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: travel-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: travel-backend
    ports:
      - "8080:8080"
    environment:
      SUPABASE_URL: https://ocitfrymaztioctnbzcc.supabase.co
      SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9jaXRmcnltYXp0aW9jdG5iemNjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwOTg5NDcsImV4cCI6MjA5NzY3NDk0N30.kDd_75zs5MHDXY11uu_praPAL_XM6rXCVzdb0cux058
      SUPABASE_SERVICE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9jaXRmcnltYXp0aW9jdG5iemNjIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4MjA5ODk0NywiZXhwIjoyMDk3Njc0OTQ3fQ.aWiqMaf95yRnU43aAQqB8nLwmeAI2R-yOXrQ7TH8cM4
      DATABASE_URL: postgresql://postgres:vishnu%40oct2004@db.ocitfrymaztioctnbzcc.supabase.co:5432/travel_agency
      PORT: 8080
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: travel-frontend
    ports:
      - "80:80"
    environment:
      REACT_APP_API_URL: http://localhost:8080/api
      REACT_APP_SOCKET_URL: http://localhost:8080
      REACT_APP_SUPABASE_URL: https://ocitfrymaztioctnbzcc.supabase.co
      REACT_APP_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9jaXRmcnltYXp0aW9jdG5iemNjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwOTg5NDcsImV4cCI6MjA5NzY3NDk0N30.kDd_75zs5MHDXY11uu_praPAL_XM6rXCVzdb0cux058
    depends_on:
      - backend
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: travel-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.2.0
    container_name: travel-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  redis-data:
  prometheus-data:
  grafana-data:
